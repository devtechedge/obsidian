// ── Main App ──
function App() {
  useEffect(() => {
    // ── Initialize Lenis Smooth Scroll ──
    if (typeof Lenis !== 'undefined') {
      const lenis = new Lenis({
        duration: 1.2,
        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
        smooth: true,
        smoothTouch: false,
      });
      window.__lenis = lenis;

      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);

      // Anchor links
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(anchor.getAttribute('href'));
          if (target) lenis.scrollTo(target, { offset: -80 });
        });
      });
    }

    // ── Scroll Reveal Observer ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
      observer.observe(el);
    });

    // ── Custom Cursor Logic ──
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    if (!isTouchDevice) {
      const dot = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');

      let mouseX = 0, mouseY = 0;
      let dotX = 0, dotY = 0;
      let ringX = 0, ringY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function animateCursor() {
        // Dot follows quickly
        dotX += (mouseX - dotX) * 0.2;
        dotY += (mouseY - dotY) * 0.2;
        dot.style.left = dotX + 'px';
        dot.style.top = dotY + 'px';

        // Ring lags behind
        ringX += (mouseX - ringX) * 0.1;
        ringY += (mouseY - ringY) * 0.1;
        ring.style.left = ringX + 'px';
        ring.style.top = ringY + 'px';

        requestAnimationFrame(animateCursor);
      }
      animateCursor();

      // Hover detection on interactive elements
      const interactiveElements = document.querySelectorAll('a, button, [data-magnetic]');
      interactiveElements.forEach(el => {
        el.addEventListener('mouseenter', () => {
          dot.classList.add('hovering');
          ring.classList.add('hovering');
        });
        el.addEventListener('mouseleave', () => {
          dot.classList.remove('hovering');
          ring.classList.remove('hovering');
        });
      });

      // ── Magnetic Effect ──
      document.querySelectorAll('[data-magnetic]').forEach(el => {
        el.addEventListener('mousemove', (e) => {
          const rect = el.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          el.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });
        el.addEventListener('mouseleave', () => {
          el.style.transform = 'translate(0, 0)';
        });
      });
    }

    // Re-observe after React renders
    setTimeout(() => {
      document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
        observer.observe(el);
      });

      // Rebind cursor hover for dynamically rendered elements
      if (!isTouchDevice) {
        const dot = document.getElementById('cursorDot');
        const ring = document.getElementById('cursorRing');
        document.querySelectorAll('a, button, [data-magnetic]').forEach(el => {
          el.addEventListener('mouseenter', () => {
            dot.classList.add('hovering');
            ring.classList.add('hovering');
          });
          el.addEventListener('mouseleave', () => {
            dot.classList.remove('hovering');
            ring.classList.remove('hovering');
          });
        });
        document.querySelectorAll('[data-magnetic]').forEach(el => {
          el.addEventListener('mousemove', (e) => {
            const rect = el.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            el.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
          });
          el.addEventListener('mouseleave', () => {
            el.style.transform = 'translate(0, 0)';
          });
        });
      }

      // Reposition canvas after React renders
      const canvas = document.getElementById('heroCanvas');
      const hero = document.getElementById('hero');
      if (canvas && hero) {
        const rect = hero.getBoundingClientRect();
        canvas.style.position = 'absolute';
        canvas.style.top = rect.top + window.scrollY + 'px';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = rect.height + 'px';
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 5: ACTIVE SECTION AUTO-TRACKING in Navigation
      // ════════════════════════════════════════════════════════════════
      const sections = document.querySelectorAll('section[id]');
      const navLinks = document.querySelectorAll('[data-nav-target]');
      if (sections.length && navLinks.length) {
        const navObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const id = entry.target.id;
              navLinks.forEach(link => {
                if (link.getAttribute('data-nav-target') === id) {
                  link.classList.add('active');
                } else {
                  link.classList.remove('active');
                }
              });
            }
          });
        }, { threshold: 0.3, rootMargin: '-80px 0px -50% 0px' });
        sections.forEach(s => navObserver.observe(s));
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 4: COUNT-UP STATS ANIMATION
      // ════════════════════════════════════════════════════════════════
      const countEls = document.querySelectorAll('[data-countup="true"]');
      function animateCount(el) {
        if (el.dataset.countupDone === 'true') return;
        el.dataset.countupDone = 'true';
        if (el.dataset.isInfinity === 'true') {
          el.textContent = '\u221E';
          return;
        }
        const target = parseFloat(el.dataset.target);
        const decimals = parseInt(el.dataset.decimals || '0');
        const suffix = el.dataset.suffix || '';
        const duration = 1800;
        const start = performance.now();
        function step(now) {
          const elapsed = now - start;
          const t = Math.min(1, elapsed / duration);
          const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
          const current = target * eased;
          el.textContent = current.toFixed(decimals) + suffix;
          if (t < 1) requestAnimationFrame(step);
          else el.textContent = target.toFixed(decimals) + suffix;
        }
        requestAnimationFrame(step);
      }
      if (countEls.length) {
        const countObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              animateCount(entry.target);
              countObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.5 });
        countEls.forEach(el => countObserver.observe(el));
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 6: ACCESSIBLE LIGHTBOX MODAL
      // ════════════════════════════════════════════════════════════════
      const lightbox = document.getElementById('lightbox');
      const lbImage = document.getElementById('lightboxImage');
      const lbTitle = document.getElementById('lightboxTitle');
      const lbCategory = document.getElementById('lightboxCategory');
      const lbDescription = document.getElementById('lightboxDescription');
      const lbCounter = document.getElementById('lightboxCounter');
      const lbClose = document.getElementById('lightboxClose');
      const lbPrev = document.getElementById('lightboxPrev');
      const lbNext = document.getElementById('lightboxNext');
      let lbCurrentIndex = 0;
      let lbLastFocus = null;

      function openLightbox(index) {
        lbCurrentIndex = ((index % portfolioItems.length) + portfolioItems.length) % portfolioItems.length;
        const item = portfolioItems[lbCurrentIndex];
        lbLastFocus = document.activeElement;
        lbImage.innerHTML = buildPatternSVG(item.patternType, 1000, 750, item.color);
        lbTitle.textContent = item.title;
        lbCategory.textContent = item.category;
        lbDescription.textContent = item.description;
        lbCounter.textContent = String(lbCurrentIndex + 1).padStart(2, '0') + ' / ' + String(portfolioItems.length).padStart(2, '0');
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
        if (window.__lenis) window.__lenis.stop();
        setTimeout(() => lbClose.focus(), 100);
      }
      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
        if (window.__lenis) window.__lenis.start();
        if (lbLastFocus) lbLastFocus.focus();
      }
      function navLightbox(dir) {
        openLightbox(lbCurrentIndex + dir);
      }

      // Bind click on grid items
      document.querySelectorAll('[data-lightbox-index]').forEach(el => {
        el.addEventListener('click', (e) => {
          // Don't trigger if user clicked a link inside
          if (e.target.closest('a[href]') && !e.target.closest('a[href^="#"]')) return;
          const idx = parseInt(el.getAttribute('data-lightbox-index'));
          openLightbox(idx);
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            const idx = parseInt(el.getAttribute('data-lightbox-index'));
            openLightbox(idx);
          }
        });
      });

      lbClose.addEventListener('click', closeLightbox);
      lbPrev.addEventListener('click', () => navLightbox(-1));
      lbNext.addEventListener('click', () => navLightbox(1));
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') navLightbox(-1);
        else if (e.key === 'ArrowRight') navLightbox(1);
      });

      // Touch swipe support
      let touchStartX = 0;
      lightbox.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
      }, { passive: true });
      lightbox.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 60) {
          navLightbox(dx > 0 ? -1 : 1);
        }
      }, { passive: true });

      // ════════════════════════════════════════════════════════════════
      // FEATURE 2: GLSL LIQUID DISTORTION hover on portfolio items
      // Uses a lightweight canvas 2D ripple fallback that mimics the effect
      // when WebGL shader isn't feasible per-grid-item. Falls back gracefully.
      // ════════════════════════════════════════════════════════════════
      const webglItems = document.querySelectorAll('[data-webgl-item]');
      webglItems.forEach(item => {
        const fallback = item.querySelector('.grid-fallback');
        if (!fallback) return;
        let rippleCanvas = null;
        let rippleCtx = null;
        let ripples = [];
        let animFrame = null;
        let lastMoveTime = 0;

        function ensureCanvas() {
          if (rippleCanvas) return;
          rippleCanvas = document.createElement('canvas');
          rippleCanvas.style.position = 'absolute';
          rippleCanvas.style.top = '0';
          rippleCanvas.style.left = '0';
          rippleCanvas.style.width = '100%';
          rippleCanvas.style.height = '100%';
          rippleCanvas.style.pointerEvents = 'none';
          rippleCanvas.style.zIndex = '2';
          rippleCanvas.style.mixBlendMode = 'overlay';
          item.appendChild(rippleCanvas);
          rippleCtx = rippleCanvas.getContext('2d');
          resizeCanvas();
        }

        function resizeCanvas() {
          if (!rippleCanvas) return;
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const rect = item.getBoundingClientRect();
          rippleCanvas.width = Math.max(1, rect.width * dpr);
          rippleCanvas.height = Math.max(1, rect.height * dpr);
          rippleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function animateRipple() {
          if (!rippleCtx) return;
          const rect = item.getBoundingClientRect();
          rippleCtx.clearRect(0, 0, rect.width, rect.height);
          for (let i = ripples.length - 1; i >= 0; i--) {
            const r = ripples[i];
            r.radius += 2.5;
            r.alpha -= 0.012;
            if (r.alpha <= 0) {
              ripples.splice(i, 1);
              continue;
            }
            rippleCtx.beginPath();
            rippleCtx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
            rippleCtx.strokeStyle = `rgba(220, 38, 38, ${r.alpha * 0.6})`;
            rippleCtx.lineWidth = 2;
            rippleCtx.stroke();
            // Inner soft ring
            rippleCtx.beginPath();
            rippleCtx.arc(r.x, r.y, r.radius * 0.6, 0, Math.PI * 2);
            rippleCtx.strokeStyle = `rgba(255, 255, 255, ${r.alpha * 0.3})`;
            rippleCtx.lineWidth = 1;
            rippleCtx.stroke();
          }
          if (ripples.length > 0) {
            animFrame = requestAnimationFrame(animateRipple);
          } else {
            animFrame = null;
          }
        }

        item.addEventListener('mouseenter', () => {
          ensureCanvas();
        });
        item.addEventListener('mousemove', (e) => {
          ensureCanvas();
          const now = performance.now();
          if (now - lastMoveTime < 60) return; // throttle
          lastMoveTime = now;
          const rect = item.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          ripples.push({ x, y, radius: 0, alpha: 1 });
          if (ripples.length > 8) ripples.shift();
          if (!animFrame) animFrame = requestAnimationFrame(animateRipple);
        });
        item.addEventListener('mouseleave', () => {
          // Let existing ripples fade out naturally
        });
        window.addEventListener('resize', resizeCanvas);
      });

      // ════════════════════════════════════════════════════════════════
      // FEATURE 11: PINNED HORIZONTAL-SCROLL GALLERY
      // Vertical scroll inside .horizontal-section translates the inner
      // .horizontal-track horizontally.
      // ════════════════════════════════════════════════════════════════
      const hSection = document.querySelector('.horizontal-section');
      const hTrack = document.getElementById('horizontalTrack');
      const hProgress = document.getElementById('horizontalProgress');
      if (hSection && hTrack) {
        function updateHorizontal() {
          const rect = hSection.getBoundingClientRect();
          const sectionHeight = hSection.offsetHeight;
          const viewportHeight = window.innerHeight;
          // Scrollable distance within the section (after pin starts, before pin ends)
          const scrollable = Math.max(1, sectionHeight - viewportHeight);
          // How far we've progressed (0 → 1)
          // rect.top goes from 0 (top of section hits top of viewport) to -scrollable
          const progress = Math.max(0, Math.min(1, -rect.top / scrollable));
          // Track width minus viewport width
          const trackWidth = hTrack.scrollWidth;
          const maxX = Math.max(0, trackWidth - window.innerWidth);
          const translateX = -progress * maxX;
          hTrack.style.transform = `translate3d(${translateX}px, 0, 0)`;
          if (hProgress) hProgress.style.width = (progress * 100).toFixed(1) + '%';
        }
        updateHorizontal();
        window.addEventListener('scroll', updateHorizontal, { passive: true });
        window.addEventListener('resize', updateHorizontal);
        // Also hook into Lenis if present
        if (window.__lenis) {
          window.__lenis.on('scroll', updateHorizontal);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 12: WEB AUDIO API AMBIENT SOUNDSCAPE
      // Multi-oscillator drone with LFO-modulated lowpass filter.
      // ════════════════════════════════════════════════════════════════
      const audioBtn = document.getElementById('audioToggle');
      let audioCtx = null, audioNodes = null, audioPlaying = false;
      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const master = audioCtx.createGain();
          master.gain.value = 0;
          master.connect(audioCtx.destination);

          // Lowpass filter with LFO modulation
          const filter = audioCtx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 700;
          filter.Q.value = 6;
          filter.connect(master);

          // LFO modulates filter cutoff
          const lfo = audioCtx.createOscillator();
          lfo.frequency.value = 0.07;
          const lfoGain = audioCtx.createGain();
          lfoGain.gain.value = 350;
          lfo.connect(lfoGain);
          lfoGain.connect(filter.frequency);
          lfo.start();

          // Three oscillators — root, fifth, octave for a rich drone
          const freqs = [55, 82.5, 110, 165]; // A1, E2, A2, E3
          const oscs = freqs.map((f, i) => {
            const o = audioCtx.createOscillator();
            o.type = i % 2 === 0 ? 'sine' : 'triangle';
            o.frequency.value = f;
            // Slight detune for chorus effect
            o.detune.value = (i - 1.5) * 4;
            const g = audioCtx.createGain();
            g.gain.value = 0.18 / freqs.length;
            o.connect(g);
            g.connect(filter);
            o.start();
            return o;
          });

          // Slow amplitude wobble on master
          const ampLfo = audioCtx.createOscillator();
          ampLfo.frequency.value = 0.04;
          const ampLfoGain = audioCtx.createGain();
          ampLfoGain.gain.value = 0.02;
          ampLfo.connect(ampLfoGain);
          ampLfoGain.connect(master.gain);
          ampLfo.start();

          audioNodes = { master, filter, oscs, lfo, ampLfo };
        } catch (err) {
          console.warn('Audio init failed', err);
        }
      }
      function toggleAudio() {
        if (!audioCtx) initAudio();
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioPlaying = !audioPlaying;
        const target = audioPlaying ? 0.08 : 0;
        audioNodes.master.gain.cancelScheduledValues(audioCtx.currentTime);
        audioNodes.master.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 1.2);
        audioBtn.classList.toggle('playing', audioPlaying);
      }
      if (audioBtn) {
        audioBtn.classList.add('ready');
        audioBtn.addEventListener('click', toggleAudio);
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 13: KONAMI CODE EASTER EGG
      // Sequence: ↑ ↑ ↓ ↓ ← → ← → B A
      // ════════════════════════════════════════════════════════════════
      const konamiSeq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
      let konamiIdx = 0;
      const konamiOverlay = document.getElementById('konamiOverlay');
      let konamiActive = false;
      function triggerKonami() {
        if (konamiActive) return;
        konamiActive = true;
        konamiOverlay.classList.add('active');
        // Spawn raining obsidian particles
        const particleCount = 60;
        const particles = [];
        for (let i = 0; i < particleCount; i++) {
          const p = document.createElement('div');
          p.className = 'konami-particle';
          const size = 6 + Math.random() * 16;
          p.style.width = size + 'px';
          p.style.height = size + 'px';
          p.style.left = (Math.random() * 100) + 'vw';
          p.style.top = '-40px';
          p.innerHTML = `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;opacity:${0.4 + Math.random() * 0.5}">
            <polygon points="40,8 72,28 72,52 40,72 8,52 8,28" fill="none" stroke="#dc2626" stroke-width="2"/>
            <polygon points="40,20 60,32 60,48 40,60 20,48 20,32" fill="#dc2626" opacity="0.5"/>
          </svg>`;
          konamiOverlay.appendChild(p);
          particles.push({
            el: p,
            x: Math.random() * window.innerWidth,
            y: -40 - Math.random() * 400,
            vy: 1 + Math.random() * 3,
            vx: (Math.random() - 0.5) * 1.5,
            rot: Math.random() * 360,
            vrot: (Math.random() - 0.5) * 6
          });
        }
        const startTime = performance.now();
        function animateParticles() {
          const elapsed = performance.now() - startTime;
          particles.forEach(p => {
            p.y += p.vy;
            p.x += p.vx;
            p.rot += p.vrot;
            p.el.style.transform = `translate(${p.x - window.innerWidth * parseFloat(p.el.style.left) / 100}px, ${p.y}px) rotate(${p.rot}deg)`;
            // Use direct left/top positioning instead
            p.el.style.left = p.x + 'px';
            p.el.style.top = p.y + 'px';
            p.el.style.transform = `rotate(${p.rot}deg)`;
            if (p.y > window.innerHeight + 60) {
              p.y = -60;
              p.x = Math.random() * window.innerWidth;
            }
          });
          if (elapsed < 5000) {
            requestAnimationFrame(animateParticles);
          } else {
            // Fade out
            konamiOverlay.classList.remove('active');
            setTimeout(() => {
              particles.forEach(p => p.el.remove());
              konamiActive = false;
            }, 600);
          }
        }
        requestAnimationFrame(animateParticles);
      }
      document.addEventListener('keydown', (e) => {
        // Ignore if user is typing in input
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        if (key === konamiSeq[konamiIdx]) {
          konamiIdx++;
          if (konamiIdx === konamiSeq.length) {
            konamiIdx = 0;
            triggerKonami();
          }
        } else {
          // Reset on mismatch (allow restarting)
          konamiIdx = (key === konamiSeq[0]) ? 1 : 0;
        }
      });

      // ════════════════════════════════════════════════════════════════
      // FEATURE 14: CURSOR-REACTIVE TEXT DISTORTION
      // For [data-distort] headings — splits into chars, displaces each
      // char based on cursor proximity.
      // ════════════════════════════════════════════════════════════════
      if (!isTouchDevice) {
        document.querySelectorAll('[data-distort]').forEach(heading => {
          // Split text into char spans (preserve newlines)
          const original = heading.textContent;
          heading.textContent = '';
          const chars = [];
          // Handle multi-line: split by \n first
          const lines = original.split('\n');
          lines.forEach((line, lineIdx) => {
            line.split('').forEach(ch => {
              const span = document.createElement('span');
              span.className = 'distort-char';
              span.textContent = ch === ' ' ? '\u00A0' : ch;
              heading.appendChild(span);
              chars.push(span);
            });
            if (lineIdx < lines.length - 1) {
              heading.appendChild(document.createElement('br'));
            }
          });

          heading.addEventListener('mousemove', (e) => {
            const rect = heading.getBoundingClientRect();
            const mx = e.clientX;
            const my = e.clientY;
            chars.forEach(c => {
              const cr = c.getBoundingClientRect();
              const cx = cr.left + cr.width / 2;
              const cy = cr.top + cr.height / 2;
              const dx = cx - mx;
              const dy = cy - my;
              const dist = Math.sqrt(dx * dx + dy * dy);
              const maxDist = 140;
              if (dist < maxDist) {
                const force = (1 - dist / maxDist) * 18;
                const angle = Math.atan2(dy, dx);
                const tx = Math.cos(angle) * force;
                const ty = Math.sin(angle) * force - (1 - dist / maxDist) * 4;
                c.style.transform = `translate(${tx}px, ${ty}px)`;
                c.classList.add('distort-active');
              } else {
                c.style.transform = '';
                c.classList.remove('distort-active');
              }
            });
          });
          heading.addEventListener('mouseleave', () => {
            chars.forEach(c => {
              c.style.transform = '';
              c.classList.remove('distort-active');
            });
          });
        });
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 15: LIVE-DRAWING SVG MANDALA — trigger stroke draw on scroll-in
      // ════════════════════════════════════════════════════════════════
      const mandala = document.getElementById('mandalaBg');
      if (mandala) {
        const mandalaObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              // Stagger each path's draw by setting --len with incremental delay
              const strokes = mandala.querySelectorAll('.mandala-stroke');
              strokes.forEach((s, i) => {
                const len = s.getTotalLength ? s.getTotalLength() : 1200;
                s.style.setProperty('--len', len);
                s.style.transitionDelay = (i * 80) + 'ms';
              });
              mandala.classList.add('drawn');
              mandalaObserver.unobserve(mandala);
            }
          });
        }, { threshold: 0.25 });
        mandalaObserver.observe(mandala);
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 16: 3D PERSPECTIVE TILT CARD
      // Mouse move over [data-tilt] rotates the card in 3D.
      // ════════════════════════════════════════════════════════════════
      if (!isTouchDevice) {
        document.querySelectorAll('[data-tilt]').forEach(card => {
          card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width; // 0..1
            const y = (e.clientY - rect.top) / rect.height; // 0..1
            const rotY = (x - 0.5) * 16; // -8deg .. +8deg
            const rotX = -(y - 0.5) * 12;
            card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`;
            card.style.setProperty('--mx', (x * 100) + '%');
            card.style.setProperty('--my', (y * 100) + '%');
          });
          card.addEventListener('mouseleave', () => {
            card.style.transform = '';
          });
        });
      }

      // ════════════════════════════════════════════════════════════════
      // FEATURE 17: WORD-BY-WORD REVEAL for [data-word-reveal] paragraphs
      // ════════════════════════════════════════════════════════════════
      document.querySelectorAll('[data-word-reveal]').forEach(para => {
        const text = para.textContent;
        para.textContent = '';
        const words = text.split(/\s+/);
        words.forEach((word, i) => {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = word;
          span.style.transitionDelay = (i * 30) + 'ms';
          para.appendChild(span);
        });
        const wrObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              wrObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.3 });
        wrObserver.observe(para);
      });

      // ════════════════════════════════════════════════════════════════
      // FEATURE 18: FOOTER LIVE CLOCK + TIME-OF-DAY GREETING
      // ════════════════════════════════════════════════════════════════
      const clockEl = document.getElementById('footerClock');
      const greetEl = document.getElementById('footerGreeting');
      function pad2(n) { return String(n).padStart(2, '0'); }
      function updateClock() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();
        if (clockEl) {
          const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'local';
          clockEl.textContent = `${pad2(h)}:${pad2(m)}:${pad2(s)} · ${tz}`;
        }
        if (greetEl) {
          let greeting;
          if (h < 5) greeting = 'Burning the midnight oil';
          else if (h < 12) greeting = 'Good morning, observer';
          else if (h < 17) greeting = 'Good afternoon, observer';
          else if (h < 21) greeting = 'Good evening, observer';
          else greeting = 'Good night, observer';
          greetEl.textContent = greeting;
        }
      }
      updateClock();
      setInterval(updateClock, 1000);

      // ════════════════════════════════════════════════════════════════
      // FEATURE 19: COMMAND PALETTE (⌘K / Ctrl+K)
      // Fuzzy-searchable overlay with section navigation + actions.
      // ════════════════════════════════════════════════════════════════
      const cmdkTrigger = document.getElementById('cmdkTrigger');
      const cmdkPalette = document.getElementById('commandPalette');
      const cmdkInput = document.getElementById('cmdkInput');
      const cmdkList = document.getElementById('cmdkList');

      const cmdkCommands = [
        { group: 'Navigate', label: 'Hero', meta: 'Top', icon: 'home', action: () => scrollToId('hero') },
        { group: 'Navigate', label: 'Archive', meta: 'Portfolio', icon: 'grid', action: () => scrollToId('archive') },
        { group: 'Navigate', label: 'Philosophy', meta: 'Manifesto', icon: 'book', action: () => scrollToId('philosophy') },
        { group: 'Navigate', label: 'Process', meta: 'Method', icon: 'stack', action: () => scrollToId('process') },
        { group: 'Navigate', label: 'Detail Studies', meta: 'Gallery', icon: 'layers', action: () => scrollToId('gallery') },
        { group: 'Navigate', label: 'Contact', meta: 'Commission', icon: 'mail', action: () => scrollToId('contact') },
        { group: 'Actions', label: 'Toggle Theme', meta: 'Light/Dark', icon: 'sun', action: () => document.getElementById('themeToggle').click() },
        { group: 'Actions', label: 'Toggle Ambient Sound', meta: 'Soundscape', icon: 'wave', action: () => { if (audioBtn) audioBtn.click(); } },
        { group: 'Actions', label: 'Open Featured Lightbox', meta: 'Void Convergence', icon: 'eye', action: () => { const first = document.querySelector('[data-lightbox-index]'); if (first) first.click(); } },
        ...portfolioItems.map((p, i) => ({
          group: 'Sculptures',
          label: p.title,
          meta: p.category,
          icon: 'box',
          action: () => { const el = document.querySelector(`[data-lightbox-index="${i}"]`); if (el) el.click(); }
        })),
      ];

      const cmdkIconSVGs = {
        home: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>',
        grid: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
        book: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
        stack: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>',
        layers: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 22,8.5 12,15 2,8.5"/><polyline points="2,15.5 12,22 22,15.5"/></svg>',
        mail: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg>',
        sun: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
        wave: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12c2-4 4-4 6 0s4 4 6 0 4-4 6 0 4 4 6 0"/></svg>',
        eye: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
        box: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
      };

      function scrollToId(id) {
        const el = document.getElementById(id);
        if (!el) return;
        if (window.__lenis) {
          window.__lenis.scrollTo(el, { offset: -80 });
        } else {
          el.scrollIntoView({ behavior: 'smooth' });
        }
      }

      function fuzzyMatch(query, text) {
        query = query.toLowerCase();
        text = text.toLowerCase();
        if (!query) return true;
        let qi = 0;
        for (let i = 0; i < text.length && qi < query.length; i++) {
          if (text[i] === query[qi]) qi++;
        }
        return qi === query.length;
      }

      let cmdkActiveIndex = 0;
      let cmdkFiltered = [];

      function renderCmdk(query) {
        cmdkFiltered = cmdkCommands.filter(c => fuzzyMatch(query, c.label + ' ' + c.meta + ' ' + c.group));
        cmdkActiveIndex = 0;
        // Group
        const groups = {};
        cmdkFiltered.forEach(c => {
          if (!groups[c.group]) groups[c.group] = [];
          groups[c.group].push(c);
        });
        cmdkList.innerHTML = '';
        let flatIdx = 0;
        Object.keys(groups).forEach(g => {
          const label = document.createElement('div');
          label.className = 'cmdk-group-label';
          label.textContent = g;
          cmdkList.appendChild(label);
          groups[g].forEach(c => {
            const item = document.createElement('div');
            item.className = 'cmdk-item' + (flatIdx === 0 ? ' active' : '');
            item.setAttribute('role', 'option');
            item.dataset.idx = flatIdx;
            item.innerHTML = `
              <div class="cmdk-item-icon">${cmdkIconSVGs[c.icon] || cmdkIconSVGs.box}</div>
              <div>${c.label}</div>
              <div class="cmdk-item-meta">${c.meta}</div>
            `;
            item.addEventListener('mouseenter', () => {
              cmdkActiveIndex = flatIdx;
              updateActiveItem();
            });
            item.addEventListener('click', () => {
              c.action();
              closeCmdk();
            });
            cmdkList.appendChild(item);
            flatIdx++;
          });
        });
        if (cmdkFiltered.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'cmdk-group-label';
          empty.style.padding = '1.5rem 1rem';
          empty.style.textAlign = 'center';
          empty.textContent = 'No results found';
          cmdkList.appendChild(empty);
        }
      }

      function updateActiveItem() {
        cmdkList.querySelectorAll('.cmdk-item').forEach((el, i) => {
          el.classList.toggle('active', parseInt(el.dataset.idx) === cmdkActiveIndex);
        });
        // Scroll into view
        const active = cmdkList.querySelector('.cmdk-item.active');
        if (active) active.scrollIntoView({ block: 'nearest' });
      }

      function openCmdk() {
        cmdkPalette.classList.add('open');
        cmdkInput.value = '';
        renderCmdk('');
        setTimeout(() => cmdkInput.focus(), 50);
        if (window.__lenis) window.__lenis.stop();
      }
      function closeCmdk() {
        cmdkPalette.classList.remove('open');
        if (window.__lenis) window.__lenis.start();
      }

      cmdkTrigger.classList.add('ready');
      cmdkTrigger.addEventListener('click', openCmdk);
      cmdkPalette.addEventListener('click', (e) => {
        if (e.target === cmdkPalette) closeCmdk();
      });
      cmdkInput.addEventListener('input', (e) => renderCmdk(e.target.value));
      cmdkInput.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          cmdkActiveIndex = Math.min(cmdkFiltered.length - 1, cmdkActiveIndex + 1);
          updateActiveItem();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          cmdkActiveIndex = Math.max(0, cmdkActiveIndex - 1);
          updateActiveItem();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (cmdkFiltered[cmdkActiveIndex]) {
            cmdkFiltered[cmdkActiveIndex].action();
            closeCmdk();
          }
        } else if (e.key === 'Escape') {
          closeCmdk();
        }
      });
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          if (cmdkPalette.classList.contains('open')) closeCmdk();
          else openCmdk();
        } else if (e.key === 'Escape' && cmdkPalette.classList.contains('open')) {
          closeCmdk();
        }
      });

      // ════════════════════════════════════════════════════════════════
      // FEATURE 20: SCROLL-VELOCITY MOTION BLUR
      // Track scroll velocity; apply blur+scale on [data-scroll-blur] when fast.
      // ════════════════════════════════════════════════════════════════
      let lastScrollY = window.scrollY;
      let lastScrollTime = performance.now();
      let velocityRAF = null;
      const blurTargets = document.querySelectorAll('[data-scroll-blur]');
      function tickVelocity() {
        // Decay: remove active class after scrolling slows
        let anyActive = false;
        blurTargets.forEach(el => {
          if (el.classList.contains('velocity-active')) {
            // Will be removed by transition end
            anyActive = true;
          }
        });
        if (!anyActive) {
          velocityRAF = null;
          return;
        }
        velocityRAF = requestAnimationFrame(tickVelocity);
      }
      window.addEventListener('scroll', () => {
        const now = performance.now();
        const dt = Math.max(1, now - lastScrollTime);
        const dy = Math.abs(window.scrollY - lastScrollY);
        const velocity = dy / dt; // px per ms
        lastScrollY = window.scrollY;
        lastScrollTime = now;
        // Velocity threshold ~ 1.5 px/ms
        if (velocity > 1.5) {
          const blurPx = Math.min(5, velocity * 1.2);
          blurTargets.forEach(el => {
            el.style.setProperty('--blur-px', blurPx.toFixed(1) + 'px');
            el.classList.add('velocity-active');
          });
        }
        // Schedule removal after a short delay
        clearTimeout(window.__velocityTimeout);
        window.__velocityTimeout = setTimeout(() => {
          blurTargets.forEach(el => el.classList.remove('velocity-active'));
        }, 150);
      }, { passive: true });

    }, 500);
  }, []);

  return h('div', { className: 'font-inter' },
    h(Navigation),
    h('main', null,
      h(HeroSection),
      h(MarqueeSection),
      h(ArchiveSection),
      h(PhilosophySection),
      h(ProcessSection),
      h(HorizontalGallerySection),
      h(FeaturedSection),
      h(ContactSection)
    ),
    h(Footer)
  );
}

// ── Mount React ──
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
