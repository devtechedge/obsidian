<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Obsidian Archive</title>

<!-- Google Fonts: Inter Variable -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />

<!-- Tailwind CSS Play CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { inter: ['Inter', 'sans-serif'] },
      screens: {
        xs: '425px',
      },
      colors: {
        gallery: { DEFAULT: '#f4f3ef', dark: '#e8e7e3', light: '#faf9f6' },
        accent: { DEFAULT: '#dc2626', hover: '#ef4444', deep: '#991b1b' }
      }
    }
  }
}
</script>

<!-- React 18 UMD -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Lenis Smooth Scroll -->
<script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

<!-- Three.js (UMD, module-free) -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: auto;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    max-width: 100vw;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
    max-width: 100vw;
    cursor: none;
    transition: background-color 0.6s ease, color 0.6s ease;
  }

  /* ── Theme Variables ── */
  :root {
    --bg-primary: #f4f3ef;
    --bg-secondary: #e8e7e3;
    --bg-overlay: rgba(244, 243, 239, 0.9);
    --text-primary: #171717;
    --text-secondary: #525252;
    --text-muted: #737373;
    --text-faint: #a3a3a3;
    --text-ghost: #d4d4d4;
    --border-color: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --pattern-fill: #e8e7e3;
    --overlay-grad: rgba(23,23,23,0.85);
    --overlay-soft: rgba(23,23,23,0.4);
    --overlay-text: #f5f5f5;
    --scrollbar-track: #f4f3ef;
    --scrollbar-thumb: #c4c3bf;
  }

  body.theme-dark {
    --bg-primary: #0a0a0a;
    --bg-secondary: #141414;
    --bg-overlay: rgba(10, 10, 10, 0.9);
    --text-primary: #f5f5f5;
    --text-secondary: #a3a3a3;
    --text-muted: #737373;
    --text-faint: #525252;
    --text-ghost: #2a2a2a;
    --border-color: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --pattern-fill: #141414;
    --overlay-grad: rgba(10,10,10,0.85);
    --overlay-soft: rgba(10,10,10,0.4);
    --overlay-text: #f5f5f5;
    --scrollbar-track: #0a0a0a;
    --scrollbar-thumb: #2a2a2a;
  }

  /* ── Hero Canvas (2D particles) ── */
  #heroCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Hero WebGL Crystal ── */
  #heroCrystal {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: auto;
    z-index: 1;
  }

  /* ── Preloader ── */
  #preloader {
    position: fixed;
    inset: 0;
    z-index: 100000;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1),
                visibility 0.8s cubic-bezier(0.16,1,0.3,1);
  }

  #preloader.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .preloader-logo {
    width: 80px;
    height: 80px;
    margin-bottom: 40px;
    animation: logoFloat 2s ease-in-out infinite;
  }

  @keyframes logoFloat {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
  }

  .preloader-logo svg {
    width: 100%;
    height: 100%;
  }

  .preloader-logo polygon, .preloader-logo rect {
    animation: logoPulse 1.5s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes logoPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .preloader-text {
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .preloader-progress {
    width: 200px;
    height: 1px;
    background: var(--border-strong);
    position: relative;
    overflow: hidden;
  }

  .preloader-progress-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: #dc2626;
    width: 0%;
    transition: width 0.2s ease;
  }

  .preloader-percentage {
    margin-top: 16px;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ── Scroll Progress Bar ── */
  #scrollProgressBar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: #dc2626;
    z-index: 99997;
    width: 0%;
    transition: width 0.05s linear;
  }

  /* ── Scroll Progress Ring ── */
  #scrollProgressRing {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    z-index: 99997;
    pointer-events: none;
  }

  #scrollProgressRing svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  #scrollProgressRing .ring-bg {
    fill: none;
    stroke: var(--border-strong);
    stroke-width: 2;
  }

  #scrollProgressRing .ring-fg {
    fill: none;
    stroke: #dc2626;
    stroke-width: 2;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.1s linear;
  }

  #scrollProgressRing .ring-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }

  /* ── Theme Toggle ── */
  #themeToggle {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-overlay);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    z-index: 99997;
    transition: all 0.3s ease;
    pointer-events: auto;
  }

  #themeToggle:hover {
    border-color: #dc2626;
    transform: scale(1.05);
  }

  #themeToggle svg {
    width: 20px;
    height: 20px;
    stroke: var(--text-primary);
    transition: opacity 0.3s ease, transform 0.4s ease;
  }

  #themeToggle .sun-icon { display: none; }
  #themeToggle .moon-icon { display: block; }
  body.theme-dark #themeToggle .sun-icon { display: block; }
  body.theme-dark #themeToggle .moon-icon { display: none; }

  /* ── Cursor Trail Canvas ── */
  #cursorTrail {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99997;
    mix-blend-mode: multiply;
  }

  body.theme-dark #cursorTrail {
    mix-blend-mode: screen;
  }

  /* ── Particle Burst Canvas ── */
  #burstCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99996;
  }

  /* ── Lightbox Modal ── */
  #lightbox {
    position: fixed;
    inset: 0;
    z-index: 99995;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    padding: 80px 40px;
  }

  #lightbox.open {
    opacity: 1;
    visibility: visible;
  }

  .lightbox-content {
    max-width: 1000px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    transform: scale(0.92);
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
  }

  #lightbox.open .lightbox-content {
    transform: scale(1);
  }

  .lightbox-image {
    background: #e8e7e3;
    aspect-ratio: 4/3;
    border-radius: 4px;
    overflow: hidden;
  }

  .lightbox-image svg {
    width: 100%;
    height: 100%;
  }

  .lightbox-meta {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .lightbox-title {
    font-size: clamp(1.75rem, 4vw, 2.75rem);
    font-weight: 700;
    color: #f5f5f5;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .lightbox-category {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #dc2626;
    margin-bottom: 12px;
  }

  .lightbox-description {
    color: #a3a3a3;
    margin-top: 12px;
    max-width: 560px;
    line-height: 1.6;
  }

  .lightbox-nav {
    display: flex;
    gap: 12px;
  }

  .lightbox-nav button {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #f5f5f5;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .lightbox-nav button:hover {
    background: #dc2626;
    border-color: #dc2626;
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #f5f5f5;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .lightbox-close:hover {
    background: #dc2626;
    border-color: #dc2626;
    transform: rotate(90deg);
  }

  .lightbox-counter {
    position: absolute;
    top: 32px;
    left: 32px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #737373;
    font-variant-numeric: tabular-nums;
  }

  /* ── Nav active link ── */
  .nav-link.active {
    color: var(--text-primary) !important;
  }

  .nav-link.active::after {
    width: 100% !important;
    background: #dc2626;
  }

  /* ── GLSL Liquid Distortion hover ── */
  .grid-item-webgl {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
  }

  .grid-item-webgl canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .grid-item-webgl .grid-fallback {
    width: 100%;
    height: 100%;
  }

  /* ── Custom Cursor ── */
  .cursor-dot {
    width: 8px; height: 8px;
    background: #dc2626;
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    transition: width 0.3s cubic-bezier(0.25,1,0.5,1),
                height 0.3s cubic-bezier(0.25,1,0.5,1),
                background 0.3s ease;
  }

  .cursor-ring {
    width: 40px; height: 40px;
    border: 1.5px solid rgba(220,38,38,0.4);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%, -50%);
    transition: width 0.4s cubic-bezier(0.25,1,0.5,1),
                height 0.4s cubic-bezier(0.25,1,0.5,1),
                border-color 0.3s ease,
                background 0.3s ease;
  }

  .cursor-dot.hovering {
    width: 16px; height: 16px;
    background: #dc2626;
  }

  .cursor-ring.hovering {
    width: 60px; height: 60px;
    border-color: rgba(220,38,38,0.25);
    background: rgba(220,38,38,0.04);
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(220,38,38,0.2);
    color: #171717;
  }

  /* ── Scroll Reveal Animations ── */
  .reveal {
    opacity: 0;
    transform: translateY(60px);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reveal-left {
    opacity: 0;
    transform: translateX(-80px);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal-left.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .reveal-right {
    opacity: 0;
    transform: translateX(80px);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal-right.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .reveal-scale {
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal-scale.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* Stagger children */
  .stagger-children .reveal:nth-child(1) { transition-delay: 0ms; }
  .stagger-children .reveal:nth-child(2) { transition-delay: 100ms; }
  .stagger-children .reveal:nth-child(3) { transition-delay: 200ms; }
  .stagger-children .reveal:nth-child(4) { transition-delay: 300ms; }
  .stagger-children .reveal:nth-child(5) { transition-delay: 400ms; }
  .stagger-children .reveal:nth-child(6) { transition-delay: 500ms; }

  /* ── Magnetic Button ── */
  .magnetic-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(0.25,1,0.5,1);
  }

  .magnetic-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: inherit;
    background: rgba(220,38,38,0.0);
    transition: background 0.3s ease;
  }

  .magnetic-btn:hover::after {
    background: rgba(220,38,38,0.06);
  }

  /* ── Grid Item Hover ── */
  .grid-item-img {
    transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .grid-item:hover .grid-item-img {
    transform: scale(1.08);
    filter: brightness(1.05) saturate(1.1);
  }

  .grid-item-overlay {
    opacity: 0;
    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .grid-item:hover .grid-item-overlay {
    opacity: 1;
  }

  /* ── Hero Line Animation ── */
  @keyframes lineExpand {
    from { width: 0; }
    to { width: 100%; }
  }

  .hero-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, #dc2626, transparent);
    animation: lineExpand 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.8s;
    width: 0;
  }

  /* ── Floating Particles ── */
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
    50% { transform: translateY(-30px) rotate(180deg); opacity: 0.5; }
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: #dc2626;
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
  }

  /* ── Marquee ── */
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .marquee-track {
    animation: marquee 30s linear infinite;
  }

  /* ── Nav link underline ── */
  .nav-link {
    position: relative;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background: #dc2626;
    transition: width 0.3s cubic-bezier(0.25,1,0.5,1);
  }

  .nav-link:hover::after {
    width: 100%;
  }

  /* ── Touch device overrides ── */
  @media (hover: none) and (pointer: coarse) {
    body { cursor: auto; }
    .cursor-dot, .cursor-ring { display: none !important; }
    .grid-item-overlay { opacity: 1; }
  }

  /* ── Noise overlay (lighter for light mode) ── */
  .noise-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* ── Number counter ── */
  .stat-number {
    font-variant-numeric: tabular-nums;
  }

  /* ── SVG Pattern Containers ── */
  .pattern-container {
    overflow: hidden;
    border-radius: 4px;
  }

  /* ── Responsive Typography ── */
  .hero-title {
    font-size: clamp(3.5rem, 12vw, 10rem);
    line-height: 0.9;
    letter-spacing: -0.04em;
    font-weight: 800;
  }

  .section-title {
    font-size: clamp(2rem, 6vw, 5rem);
    line-height: 1;
    letter-spacing: -0.03em;
    font-weight: 700;
  }

  .body-large {
    font-size: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.7;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #dc2626; }

  /* ── Touch device additions ── */
  @media (hover: none) and (pointer: coarse) {
    #themeToggle, #scrollProgressRing { cursor: pointer; }
    #cursorTrail, #burstCanvas { display: none; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ════════════════════════════════════════════════════════════════
     FEATURE 11: PINNED HORIZONTAL-SCROLL GALLERY
     ════════════════════════════════════════════════════════════════ */
  .horizontal-section {
    position: relative;
    height: 400vh; /* tall so we have scroll runway */
  }
  .horizontal-pin {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .horizontal-track {
    display: flex;
    gap: 2rem;
    padding: 0 6rem;
    will-change: transform;
    transition: transform 0.05s linear;
  }
  .horizontal-panel {
    flex: 0 0 auto;
    width: 70vw;
    max-width: 720px;
    aspect-ratio: 4 / 3;
    position: relative;
    border: 1px solid var(--border-color);
    overflow: hidden;
    border-radius: 2px;
    background: var(--bg-secondary);
  }
  .horizontal-panel .panel-meta {
    position: absolute;
    bottom: 1.5rem;
    left: 1.5rem;
    right: 1.5rem;
    z-index: 2;
    color: var(--overlay-text);
  }
  .horizontal-panel .panel-num {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 2;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--overlay-text);
    opacity: 0.7;
  }
  .horizontal-progress-track {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    width: 12rem;
    height: 1px;
    background: var(--border-strong);
    overflow: hidden;
    z-index: 3;
  }
  .horizontal-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }
  .horizontal-heading {
    position: absolute;
    top: 6rem;
    left: 6rem;
    z-index: 3;
    pointer-events: none;
  }
  @media (max-width: 768px) {
    .horizontal-panel { width: 80vw; }
    .horizontal-track { padding: 0 1.5rem; gap: 1rem; }
    .horizontal-heading { top: 2rem; left: 1.5rem; }
  }

  /* ════════════════════════════════════════════════════════════════
     FEATURE 12: AUDIO TOGGLE BUTTON
     ════════════════════════════════════════════════════════════════ */
  #audioToggle {
    position: fixed;
    bottom: 1.5rem;
    left: 1.5rem;
    z-index: 999;
    width: 44px;

  /* ════════════════════════════════════════════════════════════════

  /* ════════════════════════════════════════════════════════════════

  /* ════════════════════════════════════════════════════════════════

<script>
// ═══════════════════════════════════════════════════════════════════════
// FEATURE 7 (PRE-REACT): Apply saved theme IMMEDIATELY to prevent FOUC
// ═══════════════════════════════════════════════════════════════════════
(function applyEarlyTheme() {
  try {
    const saved = localStorage.getItem('obsidian-theme');
    if (saved === 'dark') {
      document.body.classList.add('theme-dark');
    }
  } catch (e) { /* localStorage unavailable */ }
})();

// ═══════════════════════════════════════════════════════════════════════
// FEATURE 3: PRELOADER with live percentage
// ═══════════════════════════════════════════════════════════════════════
(function initPreloader() {
  const preloader = document.getElementById('preloader');
  const fill = document.getElementById('preloaderFill');
  const percent = document.getElementById('preloaderPercent');
  if (!preloader || !fill || !percent) return;

  let progress = 0;
  let raf;
  function tick() {
    // simulate asset load with easing toward 100
    const remaining = 100 - progress;
    progress += Math.max(0.5, remaining * 0.08);
    if (progress > 99.5) progress = 100;
    fill.style.width = progress + '%';
    percent.textContent = Math.floor(progress) + '%';
    if (progress < 100) {
      raf = requestAnimationFrame(tick);
    } else {
      // Wait for window load, then hide
      const hide = () => {
        setTimeout(() => {
          preloader.classList.add('hidden');
          setTimeout(() => preloader.remove(), 900);
        }, 300);
      };
      if (document.readyState === 'complete') hide();
      else window.addEventListener('load', hide);
    }
  }
  // Start after a tiny delay so initial paint happens
  setTimeout(() => { raf = requestAnimationFrame(tick); }, 50);

  // Failsafe: hide after 6 seconds no matter what
  setTimeout(() => {
    if (!preloader.classList.contains('hidden')) {
      preloader.classList.add('hidden');
      setTimeout(() => preloader.remove(), 900);
    }
  }, 6000);
})();

// ═══════════════════════════════════════════════════════════════════════
// FEATURE 7: THEME TOGGLE
// ═══════════════════════════════════════════════════════════════════════
(function initThemeToggle() {
  const toggle = document.getElementById('themeToggle');
  if (!toggle) return;
  toggle.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('theme-dark');
    try { localStorage.setItem('obsidian-theme', isDark ? 'dark' : 'light'); } catch (e) {}
  });
})();

// ═══════════════════════════════════════════════════════════════════════
// FEATURE 10: SCROLL PROGRESS (top bar + side ring)
// ═══════════════════════════════════════════════════════════════════════
(function initScrollProgress() {
  const bar = document.getElementById('scrollProgressBar');
  const ring = document.getElementById('ringFg');
  const ringText = document.getElementById('ringText');
  if (!bar || !ring || !ringText) return;

  const CIRCUMFERENCE = 2 * Math.PI * 24; // r=24
  ring.setAttribute('stroke-dasharray', CIRCUMFERENCE);

  function update() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? Math.min(1, scrollTop / docHeight) : 0;
    bar.style.width = (pct * 100) + '%';
    ring.setAttribute('stroke-dashoffset', CIRCUMFERENCE * (1 - pct));
    ringText.textContent = Math.floor(pct * 100) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  update();
})();

// ═══════════════════════════════════════════════════════════════════════
// FEATURE 9: CURSOR ECHO MOTION-BLUR TRAIL
// ═══════════════════════════════════════════════════════════════════════
(function initCursorTrail() {
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (isTouch) return;

  const canvas = document.getElementById('cursorTrail');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const trail = [];
  const MAX_TRAIL = 18;

  let mx = -100, my = -100;
  document.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    trail.push({ x: mx, y: my, life: 1 });
    if (trail.length > MAX_TRAIL) trail.shift();
  });

  function animate() {
    ctx.clearRect(0, 0, w, h);
    // Fade existing trail
    for (let i = 0; i < trail.length; i++) {
      const p = trail[i];
      p.life *= 0.88;
      const radius = Math.max(0.5, p.life * 6);
      const alpha = p.life * 0.18;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220, 38, 38, ${alpha})`;
      ctx.fill();
    }
    // Drop dead particles
    for (let i = trail.length - 1; i >= 0; i--) {
      if (trail[i].life < 0.02) trail.splice(i, 1);
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// FEATURE 8: PARTICLE BURST on click (global, looks for [data-burst] or .magnetic-btn)
// ═══════════════════════════════════════════════════════════════════════
(function initBurstCanvas() {
  const canvas = document.getElementById('burstCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = [];
  const GRAVITY = 0.12;
  const FRICTION = 0.97;

  class BurstParticle {
    constructor(x, y) {
      this.x = x; this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 1; // slight upward bias
      this.life = 1;
      this.decay = 0.012 + Math.random() * 0.015;
      this.size = 1 + Math.random() * 2.5;
      // Mostly crimson, some white sparks
      this.isWhite = Math.random() < 0.15;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= FRICTION;
      this.vy *= FRICTION;
      this.vy += GRAVITY;
      this.life -= this.decay;
    }
    draw() {
      if (this.life <= 0) return;
      const r = Math.max(0.3, this.size * this.life);
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
      ctx.fillStyle = this.isWhite
        ? `rgba(255, 245, 245, ${this.life * 0.9})`
        : `rgba(220, 38, 38, ${this.life * 0.85})`;
      ctx.fill();
    }
  }

  function spawnBurst(x, y, count = 32) {
    for (let i = 0; i < count; i++) {
      particles.push(new BurstParticle(x, y));
    }
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.update();
      p.draw();
      if (p.life <= 0) particles.splice(i, 1);
    }
    requestAnimationFrame(animate);
  }
  animate();

  // Expose for React to call
  window.__spawnBurst = spawnBurst;

  // Global click listener for [data-burst] elements
  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-burst], .magnetic-btn');
    if (target) {
      spawnBurst(e.clientX, e.clientY, 28);
    }
  });
})();

// FEATURE 1: THREE.JS 3D CRYSTAL in hero
// ═══════════════════════════════════════════════════════════════════════
(function initHeroCrystal() {
  if (typeof THREE === 'undefined') return;
  const canvas = document.getElementById('heroCrystal');
  if (!canvas) return;

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  } catch (e) {
    console.warn('WebGL unavailable, crystal disabled');
    return;
  }

  let w = window.innerWidth;
  let h = window.innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(0, 0, 8);

  // Crystal geometry — icosahedron with wireframe overlay
  const geo = new THREE.IcosahedronGeometry(2.4, 0);
  const wireGeo = new THREE.IcosahedronGeometry(2.42, 0);

  // Custom shader material for translucent faceted look
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.DoubleSide,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0xdc2626) },
      uOpacity: { value: 0.18 }
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vPos;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uOpacity;
      varying vec3 vNormal;
      varying vec3 vPos;
      void main() {
        vec3 lightDir = normalize(vec3(0.5, 1.0, 0.8));
        float diffuse = max(dot(vNormal, lightDir), 0.0);
        float rim = 1.0 - max(dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0);
        rim = pow(rim, 1.5);
        float pulse = 0.5 + 0.5 * sin(uTime * 0.8 + length(vPos) * 1.5);
        vec3 col = uColor * (0.3 + diffuse * 0.7) + vec3(1.0) * rim * 0.4;
        float alpha = uOpacity * (0.5 + rim * 0.8 + pulse * 0.2);
        gl_FragColor = vec4(col, alpha);
      }
    `
  });

  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  const wireMat = new THREE.LineBasicMaterial({
    color: 0xdc2626,
    transparent: true,
    opacity: 0.35
  });
  const wire = new THREE.LineSegments(new THREE.WireframeGeometry(wireGeo), wireMat);
  scene.add(wire);

  // Inner glowing core
  const coreGeo = new THREE.IcosahedronGeometry(0.6, 0);
  const coreMat = new THREE.MeshBasicMaterial({
    color: 0xdc2626,
    transparent: true,
    opacity: 0.4,
    wireframe: true
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);

  // Mouse interaction
  let targetRotX = 0, targetRotY = 0;
  let rotX = 0, rotY = 0;
  let isDragging = false;
  let dragStartX = 0, dragStartY = 0;
  let dragRotX = 0, dragRotY = 0;

  canvas.addEventListener('mousemove', (e) => {
    if (isDragging) {
      targetRotY = dragRotY + (e.clientX - dragStartX) * 0.01;
      targetRotX = dragRotX + (e.clientY - dragStartY) * 0.01;
    } else {
      // Subtle parallax based on mouse position
      targetRotY = (e.clientX / w - 0.5) * 0.6;
      targetRotX = (e.clientY / h - 0.5) * 0.4;
    }
  });

  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragRotX = targetRotX;
    dragRotY = targetRotY;
    canvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = '';
  });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      dragRotX = targetRotX;
      dragRotY = targetRotY;
    }
  });
  canvas.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
      targetRotY = dragRotY + (e.touches[0].clientX - dragStartX) * 0.01;
      targetRotX = dragRotX + (e.touches[0].clientY - dragStartY) * 0.01;
    }
  });
  window.addEventListener('touchend', () => { isDragging = false; });

  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  // Pause when hero is offscreen for performance
  let heroVisible = true;
  const heroEl = document.getElementById('hero');
  if (heroEl && 'IntersectionObserver' in window) {
    const heroObs = new IntersectionObserver((entries) => {
      heroVisible = entries[0].isIntersecting;
    }, { threshold: 0 });
    heroObs.observe(heroEl);
  }

  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    if (!heroVisible) return;
    const t = clock.getElapsedTime();
    mat.uniforms.uTime.value = t;

    // Smooth rotation
    rotX += (targetRotX - rotX) * 0.06;
    rotY += (targetRotY - rotY) * 0.06;

    // Idle auto-rotation
    const idleY = t * 0.15;
    mesh.rotation.x = rotX;
    mesh.rotation.y = rotY + idleY;
    wire.rotation.x = rotX;
    wire.rotation.y = rotY + idleY;
    core.rotation.x = -rotX * 0.5;
    core.rotation.y = -rotY * 0.5 - t * 0.3;
    core.scale.setScalar(1 + Math.sin(t * 2) * 0.1);

    renderer.render(scene, camera);
  }
  animate();
})();

// HERO CANVAS — Abstract Floating Topology / Micro-Particles
// Reacts to cursor movement, 60fps, low opacity
// ═══════════════════════════════════════════════════════
(function initHeroCanvas() {
  const canvas = document.getElementById('heroCanvas');
  const ctx = canvas.getContext('2d');
  let width, height, dpr;
  let mouseX = 0, mouseY = 0;
  let targetMouseX = 0, targetMouseY = 0;
  let animId;

  // Particle pool — kept small for ARM64 performance
  const PARTICLE_COUNT = 80;
  const CONNECTION_DIST = 140;
  const MOUSE_RADIUS = 200;
  const particles = [];

  // Palette for light mode: deep charcoal with crimson highlights
  const BASE_COLOR = { r: 23, g: 23, b: 23 };   // neutral-900
  const ACCENT_COLOR = { r: 220, g: 38, b: 38 }; // crimson

  class Particle {
    constructor() {
      this.x = Math.random() * (width || window.innerWidth);
      this.y = Math.random() * (height || window.innerHeight);
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.baseRadius = 1.2 + Math.random() * 1.2;
      this.radius = this.baseRadius;
      this.isAccent = Math.random() < 0.15;
    }

    update() {
      // Gentle drift
      this.x += this.vx;
      this.y += this.vy;

      // Wrap around edges
      if (this.x < -10) this.x = width + 10;
      if (this.x > width + 10) this.x = -10;
      if (this.y < -10) this.y = height + 10;
      if (this.y > height + 10) this.y = -10;

      // Cursor attraction / repulsion
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < MOUSE_RADIUS) {
        const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
        const angle = Math.atan2(dy, dx);
        // Subtle push away + slight orbital pull
        this.x += Math.cos(angle) * force * 1.2;
        this.y += Math.sin(angle) * force * 1.2;
        // Grow near cursor
        this.radius = this.baseRadius + force * 2.5;
      } else {
        this.radius += (this.baseRadius - this.radius) * 0.05;
      }
    }

    draw() {
      const col = this.isAccent ? ACCENT_COLOR : BASE_COLOR;
      const alpha = this.isAccent ? 0.35 : 0.12;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
      ctx.fill();
    }
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = canvas.clientWidth;
    height = canvas.clientHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function init() {
    resize();
    particles.length = 0;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < CONNECTION_DIST) {
          const alpha = (1 - dist / CONNECTION_DIST) * 0.06;
          const isAccentLine = particles[i].isAccent || particles[j].isAccent;
          const col = isAccentLine ? ACCENT_COLOR : BASE_COLOR;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    // Draw connections from cursor to nearby particles
    for (let i = 0; i < particles.length; i++) {
      const dx = particles[i].x - mouseX;
      const dy = particles[i].y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < MOUSE_RADIUS) {
        const alpha = (1 - dist / MOUSE_RADIUS) * 0.1;
        ctx.beginPath();
        ctx.moveTo(mouseX, mouseY);
        ctx.lineTo(particles[i].x, particles[i].y);
        ctx.strokeStyle = `rgba(${ACCENT_COLOR.r},${ACCENT_COLOR.g},${ACCENT_COLOR.b},${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // Abstract wave layer — slow undulating mesh
  function drawWaveLayer(time) {
    const waveCount = 5;
    const rowSpacing = 60;

    ctx.save();
    for (let w = 0; w < waveCount; w++) {
      const baseY = height * 0.3 + w * rowSpacing;
      const alpha = 0.025 - w * 0.003;

      ctx.beginPath();
      for (let x = 0; x <= width; x += 6) {
        const y = baseY
          + Math.sin(x * 0.005 + time * 0.0004 + w * 1.2) * 25
          + Math.cos(x * 0.003 - time * 0.0003 + w * 0.8) * 15
          // Subtle cursor distortion
          + (() => {
            const dx = x - mouseX;
            const dy = baseY - mouseY;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < MOUSE_RADIUS * 1.5) {
              return Math.sin(d * 0.01 - time * 0.001) * (1 - d / (MOUSE_RADIUS * 1.5)) * 20;
            }
            return 0;
          })();
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${BASE_COLOR.r},${BASE_COLOR.g},${BASE_COLOR.b},${Math.max(alpha, 0.008)})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
    ctx.restore();
  }

  function animate(time) {
    ctx.clearRect(0, 0, width, height);

    // Smooth cursor tracking
    mouseX += (targetMouseX - mouseX) * 0.08;
    mouseY += (targetMouseY - mouseY) * 0.08;

    // Wave layer (behind particles)
    drawWaveLayer(time);

    // Update & draw particles
    for (const p of particles) {
      p.update();
      p.draw();
    }

    // Draw connections
    drawConnections();

    animId = requestAnimationFrame(animate);
  }

  // Events
  document.addEventListener('mousemove', (e) => {
    targetMouseX = e.clientX;
    targetMouseY = e.clientY;
  });

  window.addEventListener('resize', () => {
    resize();
  });

  // Position canvas over hero section after DOM loads
  function positionCanvas() {
    const hero = document.getElementById('hero');
    if (hero) {
      const rect = hero.getBoundingClientRect();
      canvas.style.position = 'absolute';
      canvas.style.top = rect.top + window.scrollY + 'px';
      canvas.style.left = '0';
      canvas.style.width = '100%';
      canvas.style.height = rect.height + 'px';
    }
  }

  // Init
  init();
  requestAnimationFrame(animate);

  // Reposition on load & resize
  window.addEventListener('load', () => {
    setTimeout(positionCanvas, 100);
    setTimeout(positionCanvas, 500);
  });
  window.addEventListener('resize', positionCanvas);
})();

const h = React.createElement;

// ── Generative SVG Pattern string builders (for inline use + WebGL textures + lightbox) ──
function buildPatternSVG(type, w, h, color) {
  const fill = 'var(--pattern-fill, #e8e7e3)';
  let inner = '';
  const cx = w/2, cy = h/2;

  if (type === 'vortex') {
    for (let i = 0; i < 36; i++) {
      const a = (i*10)*Math.PI/180;
      const r1 = 20, r2 = Math.min(w,h)*0.45;
      const op = (0.2 + (i/36)*0.35).toFixed(3);
      inner += `<line x1="${cx+Math.cos(a)*r1}" y1="${cy+Math.sin(a)*r1}" x2="${cx+Math.cos(a+0.5)*r2}" y2="${cy+Math.sin(a+0.5)*r2}" stroke="${color}" stroke-width="0.8" opacity="${op}"/>`;
    }
    inner += `<circle cx="${cx}" cy="${cy}" r="18" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.5"/>`;
    inner += `<circle cx="${cx}" cy="${cy}" r="8" fill="${color}" opacity="0.15"/>`;
  } else if (type === 'grid') {
    const cols = 12, rows = 12;
    const cw = w/cols, ch = h/rows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const dist = Math.sqrt(Math.pow(c-cols/2,2)+Math.pow(r-rows/2,2));
        const op = Math.max(0.02, 0.3-dist*0.035).toFixed(3);
        if (Math.random() > 0.4) {
          inner += `<rect x="${c*cw+2}" y="${r*ch+2}" width="${cw-4}" height="${ch-4}" fill="${color}" opacity="${op}" rx="1"/>`;
        }
      }
    }
  } else if (type === 'waves') {
    for (let i = 0; i < 8; i++) {
      let d = `M 0 ${h*0.15 + i*(h*0.1)}`;
      for (let x = 0; x <= w; x += 10) {
        const y = h*0.15 + i*(h*0.1) + Math.sin(x*0.02 + i*0.8)*(20+i*5);
        d += ` L ${x} ${y}`;
      }
      inner += `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.2" opacity="${(0.08+i*0.04).toFixed(3)}"/>`;
    }
  } else if (type === 'facets') {
    const pts = [];
    for (let i = 0; i < 30; i++) pts.push({x: Math.random()*w, y: Math.random()*h});
    for (let i = 0; i < pts.length; i++) {
      for (let j = i+1; j < pts.length; j++) {
        const d = Math.hypot(pts[i].x-pts[j].x, pts[i].y-pts[j].y);
        if (d < 150) {
          inner += `<line x1="${pts[i].x}" y1="${pts[i].y}" x2="${pts[j].x}" y2="${pts[j].y}" stroke="${color}" stroke-width="0.5" opacity="0.12"/>`;
        }
      }
    }
    for (const p of pts) inner += `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="${color}" opacity="0.25"/>`;
  } else if (type === 'rings') {
    for (let i = 0; i < 14; i++) {
      const op = (0.06 + (1-i/14)*0.25).toFixed(3);
      const dash = i%2===0 ? '4 6' : 'none';
      const sw = i%3===0 ? 1.5 : 0.7;
      inner += `<circle cx="${cx}" cy="${cy}" r="${15+i*14}" fill="none" stroke="${color}" stroke-width="${sw}" opacity="${op}" stroke-dasharray="${dash}"/>`;
    }
    inner += `<circle cx="${cx}" cy="${cy}" r="6" fill="${color}" opacity="0.3"/>`;
  } else if (type === 'hex') {
    const size = 30;
    const hSp = size*1.8, vSp = size*1.55;
    for (let row = 0; row < h/vSp+1; row++) {
      for (let col = 0; col < w/hSp+1; col++) {
        const x = col*hSp + (row%2 ? hSp/2 : 0);
        const y = row*vSp;
        const dist = Math.sqrt(Math.pow(x-w/2,2)+Math.pow(y-h/2,2));
        const op = Math.max(0.015, 0.15-dist*0.0005).toFixed(3);
        let d = '';
        for (let i = 0; i < 6; i++) {
          const a = (60*i-30)*Math.PI/180;
          const px = x + size*0.5*Math.cos(a);
          const py = y + size*0.5*Math.sin(a);
          d += (i===0?'M':'L')+` ${px} ${py} `;
        }
        d += 'Z';
        inner += `<path d="${d}" fill="none" stroke="${color}" stroke-width="0.4" opacity="${op}"/>`;
      }
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="${fill}"/>${inner}</svg>`;
}

function patternSVGDataURI(type, w, h, color) {
  const svg = buildPatternSVG(type, w, h, color);
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

// ── Generative SVG Pattern React Components (use SVG strings via dangerouslySetInnerHTML for theme reactivity) ──
function PatternSVG(props) {
  const { type, width, height, color } = props;
  const svgString = buildPatternSVG(type, width, height, color);
  return h('div', {
    className: 'w-full h-full',
    dangerouslySetInnerHTML: { __html: svgString }
  });
}

// ── Navigation Component ──
function Navigation() {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const handleScroll = () => setScrolled(window.scrollY > 80);
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  // Lock body scroll + stop Lenis when mobile menu is open
  useEffect(() => {
    if (menuOpen) {
      document.body.style.overflow = 'hidden';
      if (window.__lenis) window.__lenis.stop();
    } else {
      document.body.style.overflow = '';
      if (window.__lenis) window.__lenis.start();
    }
    return () => {
      document.body.style.overflow = '';
      if (window.__lenis) window.__lenis.start();
    };
  }, [menuOpen]);

  // Close menu on Escape
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') setMenuOpen(false); }
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  // Close menu if resized to desktop
  useEffect(() => {
    function onResize() { if (window.innerWidth >= 768) setMenuOpen(false); }
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const navItems = ['Archive', 'Philosophy', 'Process', 'Contact'];

  return h('nav', {
    className: `fixed top-0 left-0 right-0 z-[1000] transition-all duration-500 ${scrolled ? 'backdrop-blur-xl border-b' : ''}`,
    style: scrolled ? {
      background: 'var(--bg-overlay)',
      borderColor: 'var(--border-color)'
    } : {}
  },
    h('div', { className: 'max-w-[1440px] mx-auto px-6 md:px-12 flex items-center justify-between h-20' },
      // Logo
      h('a', {
        href: '#',
        className: 'nav-link interactive flex items-center gap-3',
        'data-magnetic': 'true',
        onClick: (e) => { e.preventDefault(); setMenuOpen(false); if (window.__lenis) window.__lenis.scrollTo(0); else window.scrollTo({ top: 0, behavior: 'smooth' }); }
      },
        h('div', { className: 'w-8 h-8 border border-accent rounded-sm flex items-center justify-center' },
          h('div', { className: 'w-3 h-3 bg-accent rounded-[1px]' })
        ),
        h('span', { className: 'text-sm font-semibold tracking-[0.2em] uppercase', style: { color: 'var(--text-primary)' } }, 'Obsidian')
      ),
      // Desktop Nav
      h('div', { className: 'hidden md:flex items-center gap-10' },
        ...navItems.map(item =>
          h('a', {
            key: item,
            href: `#${item.toLowerCase()}`,
            'data-nav-target': item.toLowerCase(),
            className: 'nav-link interactive text-xs font-medium tracking-[0.15em] uppercase transition-colors duration-300',
            'data-magnetic': 'true',
            style: { color: 'var(--text-muted)' }
          }, item)
        )
      ),
      // Mobile menu button — sits ON TOP of the overlay (higher z-index)
      h('button', {
        className: 'md:hidden interactive flex flex-col gap-1.5 relative z-[1100]',
        onClick: () => setMenuOpen(!menuOpen),
        'aria-label': menuOpen ? 'Close menu' : 'Open menu',
        'aria-expanded': menuOpen
      },
        h('span', { className: `w-6 h-[1.5px] transition-transform duration-300 ${menuOpen ? 'rotate-45 translate-y-[4.5px]' : ''}`, style: { background: 'var(--text-primary)' } }),
        h('span', { className: `w-6 h-[1.5px] transition-opacity duration-300 ${menuOpen ? 'opacity-0' : ''}`, style: { background: 'var(--text-primary)' } }),
        h('span', { className: `w-4 h-[1.5px] bg-accent transition-all duration-300 ${menuOpen ? 'w-6 -rotate-45 -translate-y-[4.5px]' : ''}` })
      )
    ),
    // Mobile Menu — FULL SCREEN overlay, covers entire viewport including top
    menuOpen && h('div', {
      className: 'md:hidden fixed inset-0 z-[1050] flex flex-col overflow-y-auto',
      style: {
        background: 'var(--bg-primary)',
        backdropFilter: 'blur(20px)',

      }
    },
      // Top bar inside menu (mirrors nav height so layout doesn't jump)
      h('div', { className: 'flex items-center justify-between h-20 px-6 flex-shrink-0' },
        // Logo
        h('div', { className: 'flex items-center gap-3' },
          h('div', { className: 'w-8 h-8 border border-accent rounded-sm flex items-center justify-center' },

          ),

        ),

        },

// ── Philosophy Section ──
function PhilosophySection() {
  const statsData = [
    { number: 47, label: 'Sculptures Generated', sub: 'and counting', suffix: '' },
    { number: 12, label: 'Algorithmic Systems', sub: 'unique processes', suffix: '' },
    { number: 3.2, label: 'Vertices Computed', sub: 'across all works', suffix: 'M', decimals: 1 },
    { number: Infinity, label: 'Possible Variations', sub: 'infinite generativity', suffix: '', isInfinity: true },
  ];

  // Build mandala SVG paths (concentric polygons + radial spokes) for FEATURE 15
  const mandalaPaths = (() => {
    const paths = [];
    const cx = 200, cy = 200;
    // Concentric hexagons
    for (let r = 40; r <= 180; r += 28) {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 2;
        pts.push(`${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`);
      }
      paths.push(`M${pts.join('L')}Z`);
    }
    // Radial spokes
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI / 6) * i - Math.PI / 2;
      paths.push(`M${cx},${cy} L${(cx + 190 * Math.cos(a)).toFixed(1)},${(cy + 190 * Math.sin(a)).toFixed(1)}`);
    }
    // Outer ring
    paths.push(`M${cx - 190},${cy} a190,190 0 1,0 380,0 a190,190 0 1,0 -380,0`);
    return paths;
  })();

  return h('section', { className: 'py-24 md:py-40 border-t relative overflow-hidden', id: 'philosophy', style: { borderColor: 'var(--border-color)' } },
    // FEATURE 15: Live-drawing SVG mandala background
    h('div', { className: 'mandala-bg', id: 'mandalaBg', 'aria-hidden': 'true' },
      h('svg', { viewBox: '0 0 400 400', xmlns: 'http://www.w3.org/2000/svg' },
        ...mandalaPaths.map((d, i) =>
          h('path', { key: i, d, className: 'mandala-stroke', style: { '--len': '1200' } })
        )
      )
    ),
    h('div', { className: 'max-w-[1440px] mx-auto px-6 md:px-12 relative z-[1]' },
      h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-16 md:gap-24' },
        // Left: Title
        h('div', null,
          h('p', { className: 'reveal text-xs font-medium tracking-[0.3em] uppercase text-accent mb-4' }, 'Philosophy'),
          h('h2', {
            className: 'reveal section-title mb-8',
            style: { color: 'var(--text-primary)' },
            'data-distort': 'true'
          }, 'Where Data\nMeets Marble'),
          h('p', {
            className: 'reveal body-large mb-8 word-reveal',
            style: { color: 'var(--text-secondary)' },
            'data-word-reveal': 'true'
          },
            'We believe that computation is the new chisel. Every algorithm carries within it the potential for beauty \u2014 the capacity to carve meaning from entropy, to sculpt light from logic. The Obsidian Archive exists at this intersection: where the rigor of code meets the fluidity of artistic vision.'
          ),
          h('p', {
            className: 'reveal body-large word-reveal',
            style: { color: 'var(--text-muted)' },
            'data-word-reveal': 'true'
          },
            'Our generative process begins with a single constraint \u2014 a rule, a rhythm, a mathematical truth \u2014 and through iteration and emergence, we arrive at forms that feel both inevitable and surprising. Each sculpture is a dialogue between intention and accident, between the deterministic and the sublime.'
          )
        ),
        // Right: Stats
        h('div', { className: 'flex flex-col justify-center' },
          h('div', { className: 'grid grid-cols-2 gap-8' },
            ...statsData.map((stat, i) =>
              h('div', { key: i, className: 'reveal border rounded-sm p-6 md:p-8', style: { borderColor: 'var(--border-color)' } },
                h('p', {
                  className: 'stat-number text-4xl md:text-5xl font-bold text-accent mb-2',
                  'data-countup': 'true',
                  'data-target': stat.isInfinity ? '' : String(stat.number),
                  'data-decimals': stat.decimals || 0,
                  'data-suffix': stat.suffix || '',
                  'data-is-infinity': stat.isInfinity ? 'true' : 'false'
                }, stat.isInfinity ? '\u221E' : '0'),
                h('p', { className: 'text-sm font-medium mb-1', style: { color: 'var(--text-primary)' } }, stat.label),
                h('p', { className: 'text-xs', style: { color: 'var(--text-faint)' } }, stat.sub)
              )
            )
          )
        )
      )
    )
  );
}
