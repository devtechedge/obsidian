<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: auto;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #f4f3ef;
    color: #171717;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── Hero Canvas ── */
  #heroCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Custom Cursor ── */
  .cursor-dot {
    width: 8px; height: 8px;
    background: #dc2626;
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    transition: width 0.3s cubic-bezier(0.25,1,0.5,1),
                height 0.3s cubic-bezier(0.25,1,0.5,1),
                background 0.3s ease;
  }

  .cursor-ring {
    width: 40px; height: 40px;
    border: 1.5px solid rgba(220,38,38,0.4);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%, -50%);
    transition: width 0.4s cubic-bezier(0.25,1,0.5,1),
                height 0.4s cubic-bezier(0.25,1,0.5,1),
                border-color 0.3s ease,
                background 0.3s ease;
  }

  .cursor-dot.hovering {
    width: 16px; height: 16px;
    background: #dc2626;
  }

  .cursor-ring.hovering {
    width: 60px; height: 60px;
    border-color: rgba(220,38,38,0.25);
    background: rgba(220,38,38,0.04);
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(220,38,38,0.2);
    color: #171717;
  }

  /* ── Scroll Reveal Animations ── */
  .reveal {
    opacity: 0;
    transform: translateY(60px);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reveal-left {
    opacity: 0;
    transform: translateX(-80px);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal-left.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .reveal-right {
    opacity: 0;
    transform: translateX(80px);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal-right.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .reveal-scale {
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal-scale.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* Stagger children */
  .stagger-children .reveal:nth-child(1) { transition-delay: 0ms; }
  .stagger-children .reveal:nth-child(2) { transition-delay: 100ms; }
  .stagger-children .reveal:nth-child(3) { transition-delay: 200ms; }
  .stagger-children .reveal:nth-child(4) { transition-delay: 300ms; }
  .stagger-children .reveal:nth-child(5) { transition-delay: 400ms; }
  .stagger-children .reveal:nth-child(6) { transition-delay: 500ms; }

  /* ── Magnetic Button ── */
  .magnetic-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(0.25,1,0.5,1);
  }

  .magnetic-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: inherit;
    background: rgba(220,38,38,0.0);
    transition: background 0.3s ease;
  }

  .magnetic-btn:hover::after {
    background: rgba(220,38,38,0.06);
  }

  /* ── Grid Item Hover ── */
  .grid-item-img {
    transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .grid-item:hover .grid-item-img {
    transform: scale(1.08);
    filter: brightness(1.05) saturate(1.1);
  }

  .grid-item-overlay {
    opacity: 0;
    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .grid-item:hover .grid-item-overlay {
    opacity: 1;
  }

  /* ── Hero Line Animation ── */
  @keyframes lineExpand {
    from { width: 0; }
    to { width: 100%; }
  }

  .hero-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, #dc2626, transparent);
    animation: lineExpand 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.8s;
    width: 0;
  }

  /* ── Floating Particles ── */
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
    50% { transform: translateY(-30px) rotate(180deg); opacity: 0.5; }
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: #dc2626;
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
  }

  /* ── Marquee ── */
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .marquee-track {
    animation: marquee 30s linear infinite;
  }

  /* ── Nav link underline ── */
  .nav-link {
    position: relative;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background: #dc2626;
    transition: width 0.3s cubic-bezier(0.25,1,0.5,1);
  }

  .nav-link:hover::after {
    width: 100%;
  }

  /* ── Touch device overrides ── */
  @media (hover: none) and (pointer: coarse) {
    body { cursor: auto; }
    .cursor-dot, .cursor-ring { display: none !important; }
    .grid-item-overlay { opacity: 1; }
  }

  /* ── Noise overlay (lighter for light mode) ── */
  .noise-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* ── Number counter ── */
  .stat-number {
    font-variant-numeric: tabular-nums;
  }

  /* ── SVG Pattern Containers ── */
  .pattern-container {
    overflow: hidden;
    border-radius: 4px;
  }

  /* ── Responsive Typography ── */
  .hero-title {
    font-size: clamp(3.5rem, 12vw, 10rem);
    line-height: 0.9;
    letter-spacing: -0.04em;
    font-weight: 800;
  }

  .section-title {
    font-size: clamp(2rem, 6vw, 5rem);
    line-height: 1;
    letter-spacing: -0.03em;
    font-weight: 700;
  }

  .body-large {
    font-size: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.7;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f4f3ef; }
  ::-webkit-scrollbar-thumb { background: #c4c3bf; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
</style>
</head>
<body>

<!-- Noise Overlay -->
<div class="noise-overlay"></div>

<!-- Custom Cursor -->
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Hero Background Canvas -->
<canvas id="heroCanvas"></canvas>

<!-- React Root -->
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════
// HERO CANVAS — Abstract Floating Topology / Micro-Particles
// Reacts to cursor movement, 60fps, low opacity
// ═══════════════════════════════════════════════════════
(function initHeroCanvas() {
  const canvas = document.getElementById('heroCanvas');
  const ctx = canvas.getContext('2d');
  let width, height, dpr;
  let mouseX = 0, mouseY = 0;
  let targetMouseX = 0, targetMouseY = 0;
  let animId;

  // Particle pool — kept small for ARM64 performance
  const PARTICLE_COUNT = 80;
  const CONNECTION_DIST = 140;
  const MOUSE_RADIUS = 200;
  const particles = [];

  // Palette for light mode: deep charcoal with crimson highlights
  const BASE_COLOR = { r: 23, g: 23, b: 23 };   // neutral-900
  const ACCENT_COLOR = { r: 220, g: 38, b: 38 }; // crimson

  class Particle {
    constructor() {
      this.x = Math.random() * (width || window.innerWidth);
      this.y = Math.random() * (height || window.innerHeight);
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.baseRadius = 1.2 + Math.random() * 1.2;
      this.radius = this.baseRadius;
      this.isAccent = Math.random() < 0.15;
    }

    update() {
      // Gentle drift
      this.x += this.vx;
      this.y += this.vy;

      // Wrap around edges
      if (this.x < -10) this.x = width + 10;
      if (this.x > width + 10) this.x = -10;
      if (this.y < -10) this.y = height + 10;
      if (this.y > height + 10) this.y = -10;

      // Cursor attraction / repulsion
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < MOUSE_RADIUS) {
        const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
        const angle = Math.atan2(dy, dx);
        // Subtle push away + slight orbital pull
        this.x += Math.cos(angle) * force * 1.2;
        this.y += Math.sin(angle) * force * 1.2;
        // Grow near cursor
        this.radius = this.baseRadius + force * 2.5;
      } else {
        this.radius += (this.baseRadius - this.radius) * 0.05;
      }
    }

    draw() {
      const col = this.isAccent ? ACCENT_COLOR : BASE_COLOR;
      const alpha = this.isAccent ? 0.35 : 0.12;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
      ctx.fill();
    }
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = canvas.clientWidth;
    height = canvas.clientHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function init() {
    resize();
    particles.length = 0;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < CONNECTION_DIST) {
          const alpha = (1 - dist / CONNECTION_DIST) * 0.06;
          const isAccentLine = particles[i].isAccent || particles[j].isAccent;
          const col = isAccentLine ? ACCENT_COLOR : BASE_COLOR;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    // Draw connections from cursor to nearby particles
    for (let i = 0; i < particles.length; i++) {
      const dx = particles[i].x - mouseX;
      const dy = particles[i].y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < MOUSE_RADIUS) {
        const alpha = (1 - dist / MOUSE_RADIUS) * 0.1;
        ctx.beginPath();
        ctx.moveTo(mouseX, mouseY);
        ctx.lineTo(particles[i].x, particles[i].y);
        ctx.strokeStyle = `rgba(${ACCENT_COLOR.r},${ACCENT_COLOR.g},${ACCENT_COLOR.b},${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // Abstract wave layer — slow undulating mesh
  function drawWaveLayer(time) {
    const waveCount = 5;
    const rowSpacing = 60;

    ctx.save();
    for (let w = 0; w < waveCount; w++) {
      const baseY = height * 0.3 + w * rowSpacing;
      const alpha = 0.025 - w * 0.003;

      ctx.beginPath();
      for (let x = 0; x <= width; x += 6) {
        const y = baseY
          + Math.sin(x * 0.005 + time * 0.0004 + w * 1.2) * 25
          + Math.cos(x * 0.003 - time * 0.0003 + w * 0.8) * 15
          // Subtle cursor distortion
          + (() => {
            const dx = x - mouseX;
            const dy = baseY - mouseY;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < MOUSE_RADIUS * 1.5) {
              return Math.sin(d * 0.01 - time * 0.001) * (1 - d / (MOUSE_RADIUS * 1.5)) * 20;
            }
            return 0;
          })();
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${BASE_COLOR.r},${BASE_COLOR.g},${BASE_COLOR.b},${Math.max(alpha, 0.008)})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
    ctx.restore();
  }

  function animate(time) {
    ctx.clearRect(0, 0, width, height);

    // Smooth cursor tracking
    mouseX += (targetMouseX - mouseX) * 0.08;
    mouseY += (targetMouseY - mouseY) * 0.08;

    // Wave layer (behind particles)
    drawWaveLayer(time);

    // Update & draw particles
    for (const p of particles) {
      p.update();
      p.draw();
    }

    // Draw connections
    drawConnections();

    animId = requestAnimationFrame(animate);
  }

  // Events
  document.addEventListener('mousemove', (e) => {
    targetMouseX = e.clientX;
    targetMouseY = e.clientY;
  });

  window.addEventListener('resize', () => {
    resize();
  });

  // Position canvas over hero section after DOM loads
  function positionCanvas() {
    const hero = document.getElementById('hero');
    if (hero) {
      const rect = hero.getBoundingClientRect();
      canvas.style.position = 'absolute';
      canvas.style.top = rect.top + window.scrollY + 'px';
      canvas.style.left = '0';
      canvas.style.width = '100%';
      canvas.style.height = rect.height + 'px';
    }
  }

  // Init
  init();
  requestAnimationFrame(animate);

  // Reposition on load & resize
  window.addEventListener('load', () => {
    setTimeout(positionCanvas, 100);
    setTimeout(positionCanvas, 500);
  });
  window.addEventListener('resize', positionCanvas);
})();


// ═══════════════════════════════════════════════════════
// REACT APPLICATION
// ═══════════════════════════════════════════════════════
const h = React.createElement;
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Generative SVG Pattern Components (Light Mode Palettes) ──
function PatternVortex(props) {
  const { width, height, color } = props;
  const lines = [];
  const cx = width / 2, cy = height / 2;
  for (let i = 0; i < 36; i++) {
    const angle = (i * 10) * Math.PI / 180;
    const r1 = 20, r2 = Math.min(width, height) * 0.45;
    lines.push(h('line', {
      key: i,
      x1: cx + Math.cos(angle) * r1, y1: cy + Math.sin(angle) * r1,
      x2: cx + Math.cos(angle + 0.5) * r2, y2: cy + Math.sin(angle + 0.5) * r2,
      stroke: color, strokeWidth: 0.8, opacity: 0.2 + (i / 36) * 0.35
    }));
  }
  return h('svg', { width, height, viewBox: `0 0 ${width} ${height}` },
    h('rect', { width, height, fill: '#e8e7e3' }),
    ...lines,
    h('circle', { cx, cy, r: 18, fill: 'none', stroke: color, strokeWidth: 1.5, opacity: 0.5 }),
    h('circle', { cx, cy, r: 8, fill: color, opacity: 0.15 })
  );
}

function PatternGrid(props) {
  const { width, height, color } = props;
  const rects = [];
  const cols = 12, rows = 12;
  const cw = width / cols, ch = height / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const dist = Math.sqrt(Math.pow(c - cols/2, 2) + Math.pow(r - rows/2, 2));
      const opacity = Math.max(0.02, 0.3 - dist * 0.035);
      if (Math.random() > 0.4) {
        rects.push(h('rect', {
          key: `${r}-${c}`, x: c * cw + 2, y: r * ch + 2,
          width: cw - 4, height: ch - 4,
          fill: color, opacity, rx: 1
        }));
      }
    }
  }
  return h('svg', { width, height, viewBox: `0 0 ${width} ${height}` },
    h('rect', { width, height, fill: '#e8e7e3' }),
    ...rects
  );
}

function PatternWaves(props) {
  const { width, height, color } = props;
  const paths = [];
  for (let i = 0; i < 8; i++) {
    let d = `M 0 ${height * 0.15 + i * (height * 0.1)}`;
    for (let x = 0; x <= width; x += 10) {
      const y = height * 0.15 + i * (height * 0.1) + Math.sin(x * 0.02 + i * 0.8) * (20 + i * 5);
      d += ` L ${x} ${y}`;
    }
    paths.push(h('path', {
      key: i, d, fill: 'none', stroke: color,
      strokeWidth: 1.2, opacity: 0.08 + i * 0.04
    }));
  }
  return h('svg', { width, height, viewBox: `0 0 ${width} ${height}` },
    h('rect', { width, height, fill: '#e8e7e3' }),
    ...paths
  );
}

function PatternFacets(props) {
  const { width, height, color } = props;
  const polygons = [];
  const points = [];
  const numPts = 30;
  for (let i = 0; i < numPts; i++) {
    points.push({ x: Math.random() * width, y: Math.random() * height });
  }
  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {
      const dist = Math.hypot(points[i].x - points[j].x, points[i].y - points[j].y);
      if (dist < 150) {
        polygons.push(h('line', {
          key: `${i}-${j}`,
          x1: points[i].x, y1: points[i].y,
          x2: points[j].x, y2: points[j].y,
          stroke: color, strokeWidth: 0.5, opacity: 0.12
        }));
        for (let k = j + 1; k < points.length; k++) {
          const d2 = Math.hypot(points[j].x - points[k].x, points[j].y - points[k].y);
          const d3 = Math.hypot(points[i].x - points[k].x, points[i].y - points[k].y);
          if (d2 < 150 && d3 < 150 && Math.random() > 0.6) {
            polygons.push(h('polygon', {
              key: `t-${i}-${j}-${k}`,
              points: `${points[i].x},${points[i].y} ${points[j].x},${points[j].y} ${points[k].x},${points[k].y}`,
              fill: color, opacity: 0.02 + Math.random() * 0.03,
              stroke: color, strokeWidth: 0.4
            }));
          }
        }
      }
    }
  }
  return h('svg', { width, height, viewBox: `0 0 ${width} ${height}` },
    h('rect', { width, height, fill: '#e8e7e3' }),
    ...polygons,
    ...points.map((p, i) => h('circle', { key: `p-${i}`, cx: p.x, cy: p.y, r: 2.5, fill: color, opacity: 0.25 }))
  );
}

function PatternRings(props) {
  const { width, height, color } = props;
  const cx = width / 2, cy = height / 2;
  const circles = [];
  for (let i = 0; i < 14; i++) {
    circles.push(h('circle', {
      key: i, cx, cy, r: 15 + i * 14,
      fill: 'none', stroke: color,
      strokeWidth: i % 3 === 0 ? 1.5 : 0.7,
      opacity: 0.06 + (1 - i / 14) * 0.25,
      strokeDasharray: i % 2 === 0 ? '4 6' : 'none'
    }));
  }
  return h('svg', { width, height, viewBox: `0 0 ${width} ${height}` },
    h('rect', { width, height, fill: '#e8e7e3' }),
    ...circles,
    h('circle', { cx, cy, r: 6, fill: color, opacity: 0.3 })
  );
}

function PatternHex(props) {
  const { width, height, color } = props;
  const hexes = [];
  const size = 30;
  const hSpacing = size * 1.8;
  const vSpacing = size * 1.55;
  for (let row = 0; row < height / vSpacing + 1; row++) {
    for (let col = 0; col < width / hSpacing + 1; col++) {
      const x = col * hSpacing + (row % 2 ? hSpacing / 2 : 0);
      const y = row * vSpacing;
      const dist = Math.sqrt(Math.pow(x - width/2, 2) + Math.pow(y - height/2, 2));
      const opacity = Math.max(0.015, 0.15 - dist * 0.0005);
      let d = '';
      for (let i = 0; i < 6; i++) {
        const angle = (60 * i - 30) * Math.PI / 180;
        const px = x + size * 0.5 * Math.cos(angle);
        const py = y + size * 0.5 * Math.sin(angle);
        d += (i === 0 ? 'M' : 'L') + ` ${px} ${py} `;
      }
      d += 'Z';
      hexes.push(h('path', { key: `${row}-${col}`, d, fill: 'none', stroke: color, strokeWidth: 0.4, opacity }));
    }
  }
  return h('svg', { width, height, viewBox: `0 0 ${width} ${height}` },
    h('rect', { width, height, fill: '#e8e7e3' }),
    ...hexes
  );
}

// ── Main App ──
function App() {
  useEffect(() => {
    // ── Initialize Lenis Smooth Scroll ──
    if (typeof Lenis !== 'undefined') {
      const lenis = new Lenis({
        duration: 1.2,
        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
        smooth: true,
        smoothTouch: false,
      });

      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);

      // Anchor links
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(anchor.getAttribute('href'));
          if (target) lenis.scrollTo(target, { offset: -80 });
        });
      });
    }

    // ── Scroll Reveal Observer ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
      observer.observe(el);
    });

    // ── Custom Cursor Logic ──
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    if (!isTouchDevice) {
      const dot = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');

      let mouseX = 0, mouseY = 0;
      let dotX = 0, dotY = 0;
      let ringX = 0, ringY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function animateCursor() {
        // Dot follows quickly
        dotX += (mouseX - dotX) * 0.2;
        dotY += (mouseY - dotY) * 0.2;
        dot.style.left = dotX + 'px';
        dot.style.top = dotY + 'px';

        // Ring lags behind
        ringX += (mouseX - ringX) * 0.1;
        ringY += (mouseY - ringY) * 0.1;
        ring.style.left = ringX + 'px';
        ring.style.top = ringY + 'px';

        requestAnimationFrame(animateCursor);
      }
      animateCursor();

      // Hover detection on interactive elements
      const interactiveElements = document.querySelectorAll('a, button, [data-magnetic]');
      interactiveElements.forEach(el => {
        el.addEventListener('mouseenter', () => {
          dot.classList.add('hovering');
          ring.classList.add('hovering');
        });
        el.addEventListener('mouseleave', () => {
          dot.classList.remove('hovering');
          ring.classList.remove('hovering');
        });
      });

      // ── Magnetic Effect ──
      document.querySelectorAll('[data-magnetic]').forEach(el => {
        el.addEventListener('mousemove', (e) => {
          const rect = el.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          el.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });
        el.addEventListener('mouseleave', () => {
          el.style.transform = 'translate(0, 0)';
        });
      });
    }

    // Re-observe after React renders
    setTimeout(() => {
      document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
        observer.observe(el);
      });

      // Rebind cursor hover for dynamically rendered elements
      if (!isTouchDevice) {
        const dot = document.getElementById('cursorDot');
        const ring = document.getElementById('cursorRing');
        document.querySelectorAll('a, button, [data-magnetic]').forEach(el => {
          el.addEventListener('mouseenter', () => {
            dot.classList.add('hovering');
            ring.classList.add('hovering');
          });
          el.addEventListener('mouseleave', () => {
            dot.classList.remove('hovering');
            ring.classList.remove('hovering');
          });
        });
        document.querySelectorAll('[data-magnetic]').forEach(el => {
          el.addEventListener('mousemove', (e) => {
            const rect = el.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            el.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
          });
          el.addEventListener('mouseleave', () => {
            el.style.transform = 'translate(0, 0)';
          });
        });
      }

      // Reposition canvas after React renders
      const canvas = document.getElementById('heroCanvas');
      const hero = document.getElementById('hero');
      if (canvas && hero) {
        const rect = hero.getBoundingClientRect();
        canvas.style.position = 'absolute';
        canvas.style.top = rect.top + window.scrollY + 'px';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = rect.height + 'px';
      }
    }, 500);
  }, []);

  return h('div', { className: 'font-inter' },
    h(Navigation),
    h('main', null,
      h(HeroSection),
      h(MarqueeSection),
      h(ArchiveSection),
      h(PhilosophySection),
      h(ProcessSection),
      h(FeaturedSection),
      h(ContactSection)
    ),
    h(Footer)
  );
}

// ── Mount React ──
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>

</body>
</html>
